# paperknight AI - Docker Compose
# GMKtec (Windows 11 + WSL2) setup
#
# Services:
#   - Ollama        Llama 3.1 8B inference, CPU only, port 11434 (fallback)
#   - ChromaDB      RAG vector store, internal only
#   - Coordinator   FastAPI bridge + RAG + web UI, port 30800
#   - shard-0..3    Llama 3.2 3B pipeline shards (primary inference)
#
# Memory budget (GMKtec 16GB):
#   Ollama:      7GB  (llama3.1:8b Q4 = ~4.7GB, fallback only)
#   Shards:      ~1.5GB each x4 = ~6GB steady state
#   Coordinator: 512MB
#   ChromaDB:    256MB
#   OS+WSL2:     ~4GB
#   NOTE: don't run Ollama + all shards at full load simultaneously
#
# Usage:
#   docker compose up -d          start all
#   docker compose ps             check status
#   docker compose logs -f        tail all logs
#   docker compose down           stop all
#   docker compose down -v        stop + delete data (WARNING: deletes model cache)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: pk-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0
      - OLLAMA_NUM_THREADS=4
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    mem_limit: 7g
    cpus: '4.0'

  chromadb:
    image: chromadb/chroma:latest
    container_name: pk-chromadb
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    mem_limit: 256m

  coordinator:
    build:
      context: ./src/coordinator
      dockerfile: Dockerfile.pk
    image: pk-coordinator:v1
    container_name: pk-coordinator
    restart: unless-stopped
    ports:
      - "30800:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMADB_URL=http://chromadb:8000
      - MODEL_NAME=llama3.1:8b
      - INFERENCE_MODE=ollama
      - SHARD_0_URL=http://shard-0:8080
      - SHARD_1_URL=http://shard-1:8080
      - SHARD_2_URL=http://shard-2:8080
      - SHARD_3_URL=http://shard-3:8080
    volumes:
      - ./certs:/certs:ro
      - history-data:/storage/history
    command: ["uvicorn", "pk_main:app", "--host", "0.0.0.0", "--port", "8000",
              "--ssl-keyfile", "/certs/key.pem", "--ssl-certfile", "/certs/cert.pem",
              "--log-level", "info"]
    mem_limit: 512m
    depends_on:
      - ollama
      - chromadb

  # ---------------------------------------------------------------------------
  # Pipeline shards - Llama 3.2 3B split across 4 containers
  # Start sequentially (each briefly uses ~6GB during model init)
  # Steady state: ~1.5GB per shard
  # ---------------------------------------------------------------------------

  shard-0:
    build:
      context: ./src/shard
    image: pk-shard:v1
    container_name: pk-shard-0
    restart: unless-stopped
    init: true
    environment:
      - SHARD_ID=0
      - MODEL_PATH=Qwen/Qwen2.5-3B-Instruct
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/hf-cache
      - HF_HUB_OFFLINE=1
    volumes:
      - hf-cache:/hf-cache    # shared model cache - downloaded once
    # no mem_limit: spikes to ~6GB during model init, drops to ~1.5GB steady state
    cpus: '2.0'

  shard-1:
    image: pk-shard:v1
    container_name: pk-shard-1
    restart: unless-stopped
    init: true
    environment:
      - SHARD_ID=1
      - MODEL_PATH=Qwen/Qwen2.5-3B-Instruct
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/hf-cache
      - HF_HUB_OFFLINE=1
    volumes:
      - hf-cache:/hf-cache
    cpus: '2.0'
    depends_on:
      - shard-0

  shard-2:
    image: pk-shard:v1
    container_name: pk-shard-2
    restart: unless-stopped
    init: true
    environment:
      - SHARD_ID=2
      - MODEL_PATH=Qwen/Qwen2.5-3B-Instruct
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/hf-cache
      - HF_HUB_OFFLINE=1
    volumes:
      - hf-cache:/hf-cache
    cpus: '2.0'
    depends_on:
      - shard-1

  shard-3:
    image: pk-shard:v1
    container_name: pk-shard-3
    restart: unless-stopped
    init: true
    environment:
      - SHARD_ID=3
      - MODEL_PATH=Qwen/Qwen2.5-3B-Instruct
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/hf-cache
      - HF_HUB_OFFLINE=1
    volumes:
      - hf-cache:/hf-cache
    cpus: '2.0'
    depends_on:
      - shard-2

volumes:
  ollama-data:    # llama3.1:8b GGUF (Ollama fallback)
  hf-cache:       # Llama 3.2 3B HuggingFace weights (shared by all shards)
  chroma-data:    # RAG knowledge base
  history-data:   # query history
