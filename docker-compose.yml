# paperknight AI - Docker Compose
# GMKtec (Windows 11 + WSL2) setup
#
# Services:
#   - Ollama        Llama 3.1 8B inference, CPU only, port 11434
#   - ChromaDB      RAG vector store, internal only
#   - Coordinator   FastAPI bridge + RAG + web UI, port 30800
#
# Memory budget (GMKtec 16GB):
#   Ollama:      7GB  (llama3.1:8b Q4 = ~4.7GB, headroom for spikes)
#   Coordinator: 512MB
#   ChromaDB:    256MB
#   OS+WSL2:     ~4GB
#
# Usage:
#   docker compose up -d          start all
#   docker compose ps             check status
#   docker compose logs -f        tail all logs
#   docker compose down           stop all
#   docker compose down -v        stop + delete data (WARNING: deletes model cache)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: pk-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0          # CPU only
      - OLLAMA_NUM_THREADS=4      # match GMKtec CPU cores (adjust if more cores available)
      - OLLAMA_NUM_CTX=2048       # context window
      - OLLAMA_KEEP_ALIVE=1h      # keep model hot in RAM
      - OLLAMA_NUM_PARALLEL=1     # one request at a time
      - OLLAMA_MAX_LOADED_MODELS=1
    mem_limit: 7g
    cpus: '4.0'

  chromadb:
    image: chromadb/chroma:latest
    container_name: pk-chromadb
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    mem_limit: 256m
    # Internal only - coordinator talks to this, not exposed to host

  coordinator:
    build:
      context: ./src/coordinator
      dockerfile: Dockerfile.pk
    image: pk-coordinator:v1
    container_name: pk-coordinator
    restart: unless-stopped
    ports:
      - "30800:8000"              # pk CLI connects here from MacBook
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMADB_URL=http://chromadb:8000
      - MODEL_NAME=llama3.1:8b
    volumes:
      - ./certs:/certs:ro        # TLS cert + key for HTTPS
      - history-data:/storage/history
    mem_limit: 512m
    depends_on:
      - ollama
      - chromadb

volumes:
  ollama-data:    # model weights (~5GB) - persists across restarts
  chroma-data:    # RAG knowledge base
  history-data:   # query history
