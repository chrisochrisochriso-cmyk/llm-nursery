apiVersion: batch/v1
kind: Job
metadata:
  name: train-basic-level
  namespace: llm-nursery
spec:
  template:
    spec:
      containers:
      - name: trainer
        image: llm-trainer:v2
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "============================================================"
            echo "🎓 BASIC LEVEL TRAINING - Ephemeral Node"
            echo "============================================================"
            echo "This node will train, save to storage, then terminate"
            echo ""
            
            python << 'PYTHON_EOF'
            import json
            import torch
            import os
            from transformers import AutoTokenizer, AutoModelForCausalLM, Trainer, TrainingArguments
            from torch.utils.data import Dataset
            from datetime import datetime
            
            print("📚 Loading training data...")
            with open('/data/training-data.json', 'r') as f:
                training_examples = json.load(f)
            print(f"✅ Loaded {len(training_examples)} training examples\n")
            
            print("🤖 Loading base DistilGPT2 model...")
            tokenizer = AutoTokenizer.from_pretrained("distilgpt2")
            model = AutoModelForCausalLM.from_pretrained("distilgpt2")
            tokenizer.pad_token = tokenizer.eos_token
            model.config.pad_token_id = tokenizer.eos_token_id
            print("✅ Model loaded\n")
            
            class SecurityQADataset(Dataset):
                def __init__(self, examples, tokenizer, max_length=128):
                    self.examples = examples
                    self.tokenizer = tokenizer
                    self.max_length = max_length
                
                def __len__(self):
                    return len(self.examples)
                
                def __getitem__(self, idx):
                    example = self.examples[idx]
                    text = f"Q: {example['question']}\nA: {example['answer']}"
                    encodings = self.tokenizer(
                        text, truncation=True, max_length=self.max_length,
                        padding='max_length', return_tensors='pt'
                    )
                    return {
                        'input_ids': encodings['input_ids'].squeeze(),
                        'attention_mask': encodings['attention_mask'].squeeze(),
                        'labels': encodings['input_ids'].squeeze()
                    }
            
            print("📊 Creating training dataset...")
            train_dataset = SecurityQADataset(training_examples, tokenizer)
            print(f"✅ Dataset ready with {len(train_dataset)} examples\n")
            
            training_args = TrainingArguments(
                output_dir='/tmp/training',
                num_train_epochs=10,
                per_device_train_batch_size=2,
                learning_rate=5e-5,
                logging_steps=5,
                save_strategy="no",
                report_to="none"
            )
            
            print("🎯 Starting training (10 epochs)...")
            trainer = Trainer(model=model, args=training_args, train_dataset=train_dataset)
            trainer.train()
            
            print("\n✅ Training complete!\n")
            
            # Test the model
            print("="*60)
            print("🧪 TESTING BASIC LEVEL COMPETENCY")
            print("="*60)
            print()
            
            test_questions = [
                "What is the principle of least privilege?",
                "What is SQL injection?",
                "What is encryption?",
                "Why are security patches important?"
            ]
            
            security_keywords = [
                ['access', 'minimum', 'necessary', 'permissions', 'privilege'],
                ['sql', 'injection', 'query', 'database', 'vulnerability'],
                ['encrypt', 'cipher', 'secure', 'protect', 'data'],
                ['patch', 'update', 'vulnerability', 'fix', 'security']
            ]
            
            correct = 0
            for i, question in enumerate(test_questions):
                print(f"Q{i+1}: {question}")
                
                prompt = f"Q: {question}\nA:"
                inputs = tokenizer(prompt, return_tensors="pt", padding=True)
                
                with torch.no_grad():
                    outputs = model.generate(
                        **inputs, max_length=150, num_return_sequences=1,
                        temperature=0.7, do_sample=True,
                        pad_token_id=tokenizer.eos_token_id
                    )
                
                answer = tokenizer.decode(outputs[0], skip_special_tokens=True)
                answer_only = answer.replace(prompt, "").strip()
                
                print(f"A: {answer_only}\n")
                
                answer_lower = answer_only.lower()
                found_keywords = [kw for kw in security_keywords[i] if kw in answer_lower]
                
                if found_keywords:
                    print(f"✅ PASS - Found: {', '.join(found_keywords)}")
                    correct += 1
                else:
                    print(f"❌ FAIL")
                print("-" * 60)
                print()
            
            score = (correct / len(test_questions)) * 100
            print("="*60)
            print(f"BASIC LEVEL SCORE: {correct}/{len(test_questions)} = {score:.1f}%")
            
            if score >= 60:
                print("🎉 PASSED BASIC LEVEL!")
                passed = True
            else:
                print("📚 Needs more training")
                passed = False
            print("="*60)
            print()
            
            # Save to PERSISTENT STORAGE
            save_path = "/storage/models/basic-level"
            print(f"💾 Saving model to persistent storage: {save_path}")
            os.makedirs(save_path, exist_ok=True)
            model.save_pretrained(save_path)
            tokenizer.save_pretrained(save_path)
            
            metadata = {
                "level": "basic",
                "timestamp": datetime.now().isoformat(),
                "score": score,
                "passed": passed
            }
            with open(f'{save_path}/metadata.json', 'w') as f:
                json.dump(metadata, f, indent=2)
            
            print("✅ Model saved to persistent storage!")
            print()
            print("="*60)
            print("🗑️  This training node will now terminate")
            print("💾 Model persists in storage node")
            print("🆓 RAM freed for next level")
            print("="*60)
            
            PYTHON_EOF
        volumeMounts:
        - name: training-data
          mountPath: /data
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      volumes:
      - name: training-data
        configMap:
          name: security-training-data
      - name: storage
        persistentVolumeClaim:
          claimName: model-storage
      restartPolicy: Never
  backoffLimit: 1
