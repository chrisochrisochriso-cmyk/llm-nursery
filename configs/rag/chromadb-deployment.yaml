# ChromaDB vector store for paperknight RAG knowledge base.
# Persists to /storage/rag/chromadb/ on model-storage PVC.
#
# NOTE: model-storage is RWO (ReadWriteOnce). Multiple pods CAN share
# it on a single-node cluster (Docker Desktop / Minikube). If you are
# running multi-node, create a dedicated RWX PVC for ChromaDB instead.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: llm-nursery
  labels:
    app: chromadb
    component: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
        component: rag
    spec:
      initContainers:
      - name: mkdir-rag
        image: busybox
        command:
          - sh
          - -c
          - |
            mkdir -p /storage/rag/chromadb \
                     /storage/rag/paperknight \
                     /storage/rag/code \
                     /storage/rag/security
            echo "RAG directories ready."
        volumeMounts:
        - name: storage
          mountPath: /storage
      containers:
      - name: chromadb
        image: chromadb/chroma:0.5.23
        env:
        - name: IS_PERSISTENT
          value: "TRUE"
        - name: PERSIST_DIRECTORY
          value: "/storage/rag/chromadb"
        - name: ANONYMIZED_TELEMETRY
          value: "FALSE"
        - name: ALLOW_RESET
          value: "TRUE"
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/v1/heartbeat
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /api/v1/heartbeat
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: model-storage
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: llm-nursery
  labels:
    app: chromadb
    component: rag
spec:
  selector:
    app: chromadb
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
