---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage
  namespace: llm-nursery
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-node
  namespace: llm-nursery
  labels:
    app: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
      - name: storage
        image: busybox
        command: ["sh", "-c"]
        args:
          - |
            echo "🗄️  Storage Node Ready"
            mkdir -p /storage/models /storage/test-results /storage/journal
            sleep infinity
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: model-storage
