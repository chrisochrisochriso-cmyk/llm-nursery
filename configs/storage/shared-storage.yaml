apiVersion: v1
kind: PersistentVolume
metadata:
  name: llm-shared-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /tmp/llm-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-data-claim
  namespace: llm-nursery
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
