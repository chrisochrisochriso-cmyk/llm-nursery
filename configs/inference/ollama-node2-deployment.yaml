# paperknight AI - Ollama Node 2
# Runs on ZimaBoard 2 (secondary inference node, Plex host)
# Handles model layers 20-39 via Ollama pipeline parallelism
#
# Hardware: Intel Celeron N3450, 8GB LPDDR4 - CPU only, no GPU
# Memory budget: 7GB hard limit (leaves 1GB for OS + Plex headroom)
#
# IMPORTANT: Plex runs on this board. DO NOT exceed 7GB memory limit.
# This namespace (paperknight-ai) is isolated from Plex - they coexist safely.
#
# Node affinity: pin to the physical ZimaBoard 2 node
#   Label your k3s node: kubectl label node <zimaboard2-hostname> pk-node=node2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-node2
  namespace: paperknight-ai
  labels:
    app: ollama-node2
    component: inference
    pk-role: secondary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-node2
  template:
    metadata:
      labels:
        app: ollama-node2
        component: inference
        pk-role: secondary
    spec:
      # Pin to ZimaBoard 2 (Plex host) - label the node first (see above)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: pk-node
                operator: In
                values:
                - node2
      initContainers:
      # Model is shared via PVC - node2 uses the same cached weights as node1
      # ReadWriteMany PVC (nfs or local-path with shared mount) required
      - name: verify-model
        image: busybox
        command: ["sh", "-c"]
        args:
          - |
            echo "paperknight AI - Node 2 init"
            # Model weights must already be on the PVC from node1's pull.
            # If they're not here, node1 hasn't finished its init yet - wait for it.
            ATTEMPTS=0
            MAX_ATTEMPTS=30
            until [ -d "/storage/ollama" ] && ls /storage/ollama/manifests 2>/dev/null | grep -q .; do
              ATTEMPTS=$((ATTEMPTS+1))
              if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
                echo "ERROR: Model weights not found on shared storage after $((MAX_ATTEMPTS*10))s"
                echo "  Expected path: /storage/ollama"
                echo "  Node 1 must complete its model pull before Node 2 can start."
                echo "  Check node1 logs: kubectl logs -n paperknight-ai deployment/ollama-node1 -c pull-model"
                exit 1
              fi
              echo "  Waiting for node1 to finish pulling model... ($ATTEMPTS/$MAX_ATTEMPTS)"
              sleep 10
            done
            echo "Model weights found on PVC - node 2 ready"
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        command: ["ollama", "serve"]
        env:
        - name: OLLAMA_MODELS
          value: /storage/ollama
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_NUM_PARALLEL
          value: "1"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"
        - name: OLLAMA_KEEP_ALIVE
          value: "1h"
        # CPU-only
        - name: OLLAMA_NUM_GPU
          value: "0"
        - name: OLLAMA_NUM_CTX
          value: "2048"
        ports:
        - containerPort: 11434
          name: api
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            # 7GB hard cap - MUST NOT exceed, Plex is on this board
            memory: "7Gi"
            cpu: "4000m"
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: pk-model-storage
---
# Internal service - coordinator uses node2 as overflow / failover
apiVersion: v1
kind: Service
metadata:
  name: ollama-node2-service
  namespace: paperknight-ai
  labels:
    app: ollama-node2
    component: inference
spec:
  selector:
    app: ollama-node2
  ports:
  - name: api
    port: 11434
    targetPort: 11434
  type: ClusterIP
