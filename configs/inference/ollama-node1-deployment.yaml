# paperknight AI - Ollama Node 1
# Runs on ZimaBoard 1 (primary inference node)
# Handles model layers 0-19 via Ollama pipeline parallelism
#
# Hardware: Intel Celeron N3450, 8GB LPDDR4 - CPU only, no GPU
# Memory budget: 7GB hard limit (leaves 1GB for OS)
# Model: LFM2-24B-A2B Q4_K_M (~13.5GB total, split across node1 + node2)
#
# Node affinity: pin to the physical ZimaBoard 1 node
#   Label your k3s node: kubectl label node <zimaboard1-hostname> pk-node=node1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-node1
  namespace: paperknight-ai
  labels:
    app: ollama-node1
    component: inference
    pk-role: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-node1
  template:
    metadata:
      labels:
        app: ollama-node1
        component: inference
        pk-role: primary
    spec:
      # Pin to ZimaBoard 1 - label the node first (see above)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: pk-node
                operator: In
                values:
                - node1
      initContainers:
      # Pull model on first run - model is cached on PVC so pod restarts skip this
      - name: pull-model
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            echo "paperknight AI - Node 1 init"
            echo "Starting temporary Ollama to pull LFM2-24B..."
            OLLAMA_MODELS=/storage/ollama ollama serve &
            OLLAMA_PID=$!

            # Wait for Ollama to be ready (up to 60s)
            for i in $(seq 1 30); do
              if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
                echo "Ollama ready on node1"
                break
              fi
              echo "  waiting ($i/30)..."
              sleep 2
            done

            # Check if model is already cached
            if OLLAMA_MODELS=/storage/ollama ollama list 2>/dev/null | grep -q "lfm2:24b"; then
              echo "LFM2-24B already cached on PVC - skipping pull"
            else
              echo "Pulling lfm2:24b (~13.5GB Q4_K_M - this takes a while on first run)..."
              OLLAMA_MODELS=/storage/ollama ollama pull lfm2:24b
              echo "Pull complete"
            fi

            kill $OLLAMA_PID
            wait $OLLAMA_PID 2>/dev/null || true
            echo "Node 1 init complete"
        env:
        - name: OLLAMA_MODELS
          value: /storage/ollama
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            # Allow extra memory during pull (model file is ~13.5GB)
            memory: "2Gi"
            cpu: "2000m"
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        command: ["ollama", "serve"]
        env:
        - name: OLLAMA_MODELS
          value: /storage/ollama
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_NUM_PARALLEL
          value: "1"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"
        # Keep model hot for 1 hour - ZimaBoard is always-on
        - name: OLLAMA_KEEP_ALIVE
          value: "1h"
        # CPU-only - disable GPU detection
        - name: OLLAMA_NUM_GPU
          value: "0"
        # Limit to half of context to save RAM on this node
        - name: OLLAMA_NUM_CTX
          value: "2048"
        ports:
        - containerPort: 11434
          name: api
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            # 7GB hard cap - leaves 1GB for OS
            memory: "7Gi"
            cpu: "4000m"
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          # Model load on CPU takes time
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: pk-model-storage
---
# Internal service - coordinator talks to this on port 11434
apiVersion: v1
kind: Service
metadata:
  name: ollama-node1-service
  namespace: paperknight-ai
  labels:
    app: ollama-node1
    component: inference
spec:
  selector:
    app: ollama-node1
  ports:
  - name: api
    port: 11434
    targetPort: 11434
  type: ClusterIP
